name: workout_app
description: A scalable workout app with custom builder and scheduling.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.3.0
  provider: ^6.1.2
  audioplayers: ^5.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
    android: true
    ios: false
    image_path: "assets/images/app_icon.png"
    min_sdk_android: 21


flutter:
  uses-material-design: true

  assets:
      - assets/images/
      - assets/sounds/

